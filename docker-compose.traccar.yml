services:
  postgres:
    image: postgres:15-alpine
    container_name: bantay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bantay}
      POSTGRES_USER: ${POSTGRES_USER:-bantay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantay}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bantay-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-bantay}:${POSTGRES_PASSWORD:-bantay}@postgres:5432/${POSTGRES_DB:-bantay}}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpass}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_CREATE_ON_STARTUP: ${ADMIN_CREATE_ON_STARTUP:-"true"}
      TRACCAR_API_URL: ${TRACCAR_API_URL:-http://traccar:8082/api}
      TRACCAR_API_TOKEN: ${TRACCAR_API_TOKEN:-}
      TRACCAR_SHARED_SECRET: ${TRACCAR_SHARED_SECRET:-thisisasecret}
    depends_on:
      - postgres
      - traccar
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: bantay-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  traccar-db:
    image: mysql:8.4
    container_name: traccar-db
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: traccar
      MYSQL_USER: ${TRACCAR_DB_USER:-traccar}
      MYSQL_PASSWORD: ${TRACCAR_DB_PASSWORD:-traccar}
    volumes:
      - traccar_db_data:/var/lib/mysql

  traccar:
    image: traccar/traccar:latest
    container_name: traccar
    restart: unless-stopped
    depends_on:
      - traccar-db
    environment:
      CONFIG_USE_ENVIRONMENT_VARIABLES: "true"
      DATABASE_DRIVER: com.mysql.cj.jdbc.Driver
      DATABASE_URL: >-
        jdbc:mysql://traccar-db:3306/traccar
        ?zeroDateTimeBehavior=round
        &serverTimezone=UTC
        &allowPublicKeyRetrieval=true
        &useSSL=false
        &allowMultiQueries=true
        &autoReconnect=true
        &useUnicode=yes
        &characterEncoding=UTF-8
        &sessionVariables=sql_mode=''
      DATABASE_USER: ${TRACCAR_DB_USER:-traccar}
      DATABASE_PASSWORD: ${TRACCAR_DB_PASSWORD:-traccar}
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8082/api/health" ]
      interval: 2m
      timeout: 5s
      start_period: 1h
      retries: 3
    ports:
      - "8082:8082"
      - "5000-5500:5000-5500"
    volumes:
      - traccar_logs:/opt/traccar/logs
    configs:
      - source: traccar-config
        target: /opt/traccar/conf/traccar.xml
        uid: "0"
        gid: "0"
        mode: 0444

volumes:
  db_data:
  traccar_db_data:
  traccar_logs:

configs:
  traccar-config:
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <!DOCTYPE properties SYSTEM 'http://java.sun.com/dtd/properties.dtd'>
      <properties>
        <entry key='forward.enable'>${TRACCAR_FORWARD_ENABLE:-true}</entry>
        <entry key='forward.url'>${TRACCAR_FORWARD_URL:-http://backend:8000/api/traccar/positions}</entry>
        <entry key='forward.type'>${TRACCAR_FORWARD_TYPE:-json}</entry>
        <entry key='forward.header'>Authorization: Bearer ${TRACCAR_SHARED_SECRET:-thisisasecret}</entry>
        <entry key='event.forward.enable'>${TRACCAR_EVENT_FORWARD_ENABLE:-true}</entry>
        <entry key='event.forward.url'>${TRACCAR_EVENT_FORWARD_URL:-http://backend:8000/api/traccar/events}</entry>
        <entry key='event.forward.type'>${TRACCAR_EVENT_FORWARD_TYPE:-json}</entry>
        <entry key='event.forward.header'>Authorization: Bearer ${TRACCAR_SHARED_SECRET:-thisisasecret}</entry>
      </properties>