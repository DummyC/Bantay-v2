services:
  postgres:
    image: postgres:15-alpine
    container_name: bantay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bantay}
      POSTGRES_USER: ${POSTGRES_USER:-bantay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bantay}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bantay-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-bantay}:${POSTGRES_PASSWORD:-bantay}@postgres:5432/${POSTGRES_DB:-bantay}}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-adminpass}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_CREATE_ON_STARTUP: ${ADMIN_CREATE_ON_STARTUP:-"true"}
      TRACCAR_API_URL: ${TRACCAR_API_URL:-}
      TRACCAR_API_TOKEN: ${TRACCAR_API_TOKEN:-}
      TRACCAR_SHARED_SECRET: ${TRACCAR_SHARED_SECRET:-}
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: bantay-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: